<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <style>
        body {
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #ffe6e6;
            font-family: 'Arial', sans-serif;
            overflow: hidden; /* Prevents scrollbars when button moves */
        }

        h1 {
            color: #ff4d4d;
            font-size: 3rem;
            text-align: center;
            margin-bottom: 30px;
        }

        /* This container forces them to sit side-by-side with a gap */
        .button-wrapper {
            display: flex;
            gap: 40px; 
            align-items: center;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.5rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            color: white;
            font-weight: bold;
            /* CRITICAL: No absolute or fixed positioning here initially! */
        }

        #yesBtn {
            background-color: #4CAF50;
        }

        #noBtn {
            background-color: #f44336;
            transition: top 0.2s ease, left 0.2s ease; /* Makes the movement smooth */
        }
    </style>
</head>
<body>

    <h1 id="message">Dear Tejaswi,  Do you love me? 💖</h1>
    
    <div class="button-wrapper" id="btnWrapper">
        <button class="btn" id="yesBtn" onclick="yesClicked()">Yes</button>
        <button class="btn" id="noBtn" onmouseover="moveNo()" onclick="moveNo()">No</button>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');

        function moveNo() {
            // 1. Change to absolute ONLY when hovered, so it breaks free from the side-by-side layout
            noBtn.style.position = 'absolute';
            
            // 2. Calculate safe screen limits so it doesn't go off-screen
            const maxX = window.innerWidth - noBtn.offsetWidth;
            const maxY = window.innerHeight - noBtn.offsetHeight;
            
            // 3. Generate random coordinates
            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);
            
            // 4. Apply the new coordinates
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        function yesClicked() {
            document.getElementById('message').innerHTML = "I knew it! ❤️ I love you too, Baby! 💕";
            document.getElementById('btnWrapper').style.display = 'none';
            document.body.style.backgroundColor = '#ffcccc';
        }
    </script>
</body>
</html>
